services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PROXY_URL=https://jsonplaceholder.typicode.com # upstream target URL
      - PROXY_EXPIRY=1800
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
